<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Placeholder for a career or school image">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16283f"/>
      <stop offset="1" stop-color="#0f1e33"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgc)"/>
  <rect x="20" y="20" width="1160" height="760" rx="18" fill="none" stroke="#2a3d57" stroke-width="2" stroke-dasharray="10 10"/>
  <!-- orbit motif (nods to space operations) -->
  <g fill="none" stroke="#2a3d57" stroke-width="2">
    <ellipse cx="600" cy="360" rx="360" ry="150"/>
    <ellipse cx="600" cy="360" rx="240" ry="240"/>
  </g>
  <circle cx="600" cy="360" r="70" fill="#c8a24b"/>
  <circle cx="960" cy="360" r="16" fill="#d9bc6a"/>
  <circle cx="600" cy="120" r="12" fill="#d9bc6a"/>
  <g stroke="#c8a24b" stroke-width="6" stroke-linecap="round">
    <line x1="600" y1="360" x2="600" y2="300"/>
    <line x1="600" y1="360" x2="655" y2="390"/>
  </g>
  <text x="600" y="640" text-anchor="middle" font-family="Georgia, serif" font-size="46" fill="#f3f0e9">Career &amp; School Image</text>
  <text x="600" y="695" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#b9c4d2">Replace with a photo of your work or campus</text>
</svg>
